# Downstream Analysis Configuration
# Run from the PROJECT ROOT with:
#   snakemake -s downstream/Snakefile --use-conda --cores 32 --resources mem_mb=30000

# Sample manifest (shared with main Snakefile)
samples: "config/samples.tsv"

# Input paths from completed main pipeline
contigs_dir: "results/amr/{sample}_assembly/contigs.fasta"
core_tab: "results/phylogeny/core.tab"
abricate_sum: "results/amr/summary_abricate.tab"
metadata: "results/ready_to_download/typing/metadata_summary.tsv"

# PlasmidFinder database path
# The pipeline will auto-download this if not present
plasmid_db: "data/reference/plasmidfinder_db"

# HPC Resource Limits
# HPC specs: 125 GB RAM, 128 cores
# Policy: use at most 32 cores and 30 GB for downstream
max_cores: 32
max_mem_mb: 30000

# Roary settings
roary:
  identity: 95

# FastANI settings
fastani:
  species_threshold: 97.0

name: kpneumo_wgs
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # --- Base system ---
  # Python 3.9 is required for compatibility with older bioconda packages
  - python=3.9
  - pandas
  - snakemake>=7.32.0
  - sra-tools>=3.0

  # --- QC & Trimming ---
  - fastqc
  - fastp
  - multiqc

  # --- Alignment & BAM QC ---
  # Note: bwa version left unpinned so rgi can pick compatible bwa>=0.7.18
  - bwa
  - samtools
  - qualimap

  # --- Variant Calling & Annotation ---
  - freebayes
  - vcflib
  - snpeff
  - snpsift
  - snippy
  - snp-sites

  # --- Phylogeny ---
  - fasttree

  # --- Assembly & QC ---
  - spades
  - quast

  # --- AMR Profiling & Typing ---
  - abricate
  - rgi
  - ncbi-amrfinderplus
  - resfinder
  - kleborate
  - mlst
